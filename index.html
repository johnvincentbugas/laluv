<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Date Me 😂</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="box">

  <h1>Will you go on a date with me? 💘</h1>

  <div class="buttons">
    <button id="yes">YES 😍</button>
    <button id="no">NO 😈</button>
  </div>

  <div class="section" id="foodSection">
    <h3>Where should we eat? 🍔</h3>

    <select id="food">
      <option>Jollibee</option>
      <option>McDonald's</option>
      <option>KFC</option>
      <option>Karaoke + Street Food</option>
      <option>ALMA? 😂</option>
    </select>

    <h3>Date & Time 📅</h3>
    <input type="datetime-local" id="datetime">

    <button onclick="confirmDate()" class="confirmBtn">
      Confirm Date ❤️
    </button>

    <div class="final" id="finalText"></div>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
